kind = "api"
previewPath = "/api"
title = "Telegram Bot"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "pnpm --filter @workspace/api-server run dev"

[services.production]
deploymentTarget = "vm"

[services.production.run]
args = ["python", "telegram-bot/bot.py"]

[services.production.run.env]
TELEGRAM_BOT_TOKEN = "${TELEGRAM_BOT_TOKEN}"
ADMIN_ID = "${ADMIN_ID}"
